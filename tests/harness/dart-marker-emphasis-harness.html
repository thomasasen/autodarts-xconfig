<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Dart Marker Emphasis Harness</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; background: #111827; color: #f8fafc; }
      .pass { color: #86efac; }
      .fail { color: #fca5a5; }
      svg { width: 420px; height: 420px; background: #020617; border-radius: 12px; }
    </style>
  </head>
  <body>
    <h1>Dart Marker Emphasis Harness</h1>
    <p id="summary">Prüfung läuft ...</p>

    <svg viewBox="0 0 1000 1000" aria-label="board">
      <g>
        <circle cx="500" cy="500" r="460" fill="none" stroke="#334155"></circle>
        <circle cx="500" cy="500" r="320" fill="none" stroke="#334155"></circle>
      </g>
      <g>
        <circle cx="300" cy="300" r="6" style="filter:shadow-2dp" data-hit="1"></circle>
        <circle cx="500" cy="250" r="6" style="filter:shadow-2dp" data-hit="1"></circle>
        <circle cx="700" cy="340" r="6" style="filter:shadow-2dp" data-hit="1"></circle>
      </g>
    </svg>

    <script type="module">
      import { createDomGuards } from "../../src/core/dom-guards.js";
      import { createObserverRegistry } from "../../src/core/observer-registry.js";
      import { createListenerRegistry } from "../../src/core/listener-registry.js";
      import { createRafScheduler } from "../../src/shared/raf-scheduler.js";
      import { initializeDartMarkerEmphasis } from "../../src/features/dart-marker-emphasis/index.js";

      const summary = document.getElementById("summary");

      const cleanup = initializeDartMarkerEmphasis({
        documentRef: document,
        windowRef: window,
        domGuards: createDomGuards({ documentRef: document }),
        registries: {
          observers: createObserverRegistry(),
          listeners: createListenerRegistry(),
        },
        config: {
          getFeatureConfig() {
            return {
              enabled: true,
              size: 9,
              color: "rgb(248, 113, 113)",
              effect: "pulse",
              opacityPercent: 85,
              outline: "weiss",
            };
          },
        },
        helpers: {
          createRafScheduler: (cb, options = {}) => createRafScheduler(cb, options),
        },
      });

      const wait = (ms = 50) => new Promise((resolve) => setTimeout(resolve, ms));

      (async () => {
        await wait(140);
        const marker = document.querySelector("circle[data-hit]");
        const before = marker?.classList?.contains("ad-ext-dart-marker");
        const style = Boolean(document.getElementById("ad-ext-dart-marker-emphasis-style"));

        cleanup();
        await wait(40);

        const after = marker?.classList?.contains("ad-ext-dart-marker");
        const styleAfter = Boolean(document.getElementById("ad-ext-dart-marker-emphasis-style"));

        const passed = before && style && !after && !styleAfter;
        summary.textContent = passed
          ? "PASS: Marker-Hervorhebung aktiv und Cleanup korrekt."
          : "FAIL: Marker-Hervorhebung prüfen.";
        summary.className = passed ? "pass" : "fail";
      })();
    </script>
  </body>
</html>
