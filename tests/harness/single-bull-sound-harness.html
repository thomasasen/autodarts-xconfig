<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Single Bull Sound Harness</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; background: #111827; color: #f8fafc; }
      .pass { color: #86efac; }
      .fail { color: #fca5a5; }
      .ad-ext-turn-throw { margin: 10px 0; }
      .ad-ext-turn-throw p { display: inline-block; margin: 0; padding: 8px 10px; border-radius: 8px; background: #1f2937; }
    </style>
  </head>
  <body>
    <h1>Single Bull Sound Harness</h1>
    <p id="summary">Prüfung läuft ...</p>

    <div class="ad-ext-turn-throw"><p class="chakra-text" id="throw-a">S20</p></div>

    <script type="module">
      import { createObserverRegistry } from "../../src/core/observer-registry.js";
      import { createListenerRegistry } from "../../src/core/listener-registry.js";
      import { createEventBus } from "../../src/core/event-bus.js";
      import { createRafScheduler } from "../../src/shared/raf-scheduler.js";
      import { initializeSingleBullSound } from "../../src/features/single-bull-sound/index.js";
      import { x01Rules } from "../../src/domain/x01-rules.js";

      const summary = document.getElementById("summary");
      const throwNode = document.getElementById("throw-a");
      const subscribers = new Set();
      let playCalls = 0;

      class MockAudio {
        constructor(src = "") {
          this.src = src;
          this.volume = 1;
          this.currentTime = 0;
          this.preload = "auto";
        }

        play() {
          playCalls += 1;
          return Promise.resolve();
        }

        pause() {}
      }

      window.Audio = MockAudio;

      const gameState = {
        getActiveTurn() {
          return {
            id: "turn-1",
            playerId: "player-1",
          };
        },
        getActiveThrows() {
          return [{ segment: { name: "S25" } }];
        },
        subscribe(listener) {
          if (typeof listener !== "function") {
            return () => {};
          }
          subscribers.add(listener);
          return () => subscribers.delete(listener);
        },
      };

      function emitState() {
        subscribers.forEach((listener) => {
          try {
            listener();
          } catch (_) {}
        });
      }

      const cleanup = initializeSingleBullSound({
        documentRef: document,
        windowRef: window,
        gameState,
        eventBus: createEventBus(),
        domain: { x01Rules },
        registries: {
          observers: createObserverRegistry(),
          listeners: createListenerRegistry(),
        },
        config: {
          getFeatureConfig() {
            return {
              enabled: true,
              volume: 0.9,
              cooldownMs: 700,
              pollIntervalMs: 0,
            };
          },
        },
        helpers: {
          createRafScheduler: (cb, options = {}) => createRafScheduler(cb, options),
        },
      });

      const wait = (ms = 50) => new Promise((resolve) => setTimeout(resolve, ms));

      (async () => {
        throwNode.textContent = "S25";
        emitState();
        await wait(140);

        const playedBeforeCleanup = playCalls > 0;
        cleanup();

        const listenersCleared = subscribers.size === 0;

        const passed = playedBeforeCleanup && listenersCleared;
        summary.textContent = passed
          ? "PASS: Single-Bull erkannt und Sound getriggert."
          : "FAIL: Single-Bull-Sound prüfen.";
        summary.className = passed ? "pass" : "fail";
      })();
    </script>
  </body>
</html>
