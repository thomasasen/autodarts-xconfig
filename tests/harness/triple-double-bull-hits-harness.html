<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Triple Double Bull Hits Harness</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        background: #0d1117;
        color: #f3f4f6;
      }
      .pass {
        color: #86efac;
      }
      .fail {
        color: #fca5a5;
      }
      .ad-ext-turn-throw {
        margin: 8px 0;
      }
      .ad-ext-turn-throw p {
        display: inline-block;
        margin: 0;
        padding: 6px 8px;
        border-radius: 8px;
        background: #1f2937;
      }
    </style>
  </head>
  <body>
    <h1>Triple Double Bull Hits Harness</h1>
    <p id="summary">Running...</p>
    <ul id="results"></ul>

    <div class="ad-ext-turn-throw"><p class="chakra-text" id="throw-1">T20</p></div>
    <div class="ad-ext-turn-throw"><p class="chakra-text" id="throw-2">D16</p></div>
    <div class="ad-ext-turn-throw"><p class="chakra-text" id="throw-3">BULL</p></div>
    <div class="ad-ext-turn-throw"><p class="chakra-text" id="throw-4">S20</p></div>

    <script type="module">
      import { createDomGuards } from "../../src/core/dom-guards.js";
      import { createObserverRegistry } from "../../src/core/observer-registry.js";
      import { createListenerRegistry } from "../../src/core/listener-registry.js";
      import { initializeTripleDoubleBullHits } from "../../src/features/triple-double-bull-hits/index.js";
      import {
        HIT_KIND_CLASS,
        STYLE_ID,
      } from "../../src/features/triple-double-bull-hits/style.js";
      import { x01Rules } from "../../src/domain/x01-rules.js";

      const summaryNode = document.getElementById("summary");
      const resultList = document.getElementById("results");
      const throw1 = document.getElementById("throw-1");
      const throw2 = document.getElementById("throw-2");
      const throw3 = document.getElementById("throw-3");
      const throw4 = document.getElementById("throw-4");
      const subscribers = new Set();

      const gameState = {
        subscribe(listener) {
          if (typeof listener !== "function") {
            return () => {};
          }
          subscribers.add(listener);
          return () => subscribers.delete(listener);
        },
      };

      function emitState() {
        subscribers.forEach((listener) => {
          try {
            listener();
          } catch (_) {}
        });
      }

      const cleanup = initializeTripleDoubleBullHits({
        documentRef: document,
        windowRef: window,
        domGuards: createDomGuards({ documentRef: document }),
        registries: {
          observers: createObserverRegistry(),
          listeners: createListenerRegistry(),
        },
        gameState,
        domain: { x01Rules },
        config: {
          getFeatureConfig() {
            return {
              enabled: true,
              highlightTriple: true,
              highlightDouble: true,
              highlightBull: true,
              pollIntervalMs: 0,
            };
          },
        },
        helpers: {
          createRafScheduler(callback) {
            let queued = false;
            let raf = 0;
            return {
              schedule() {
                if (queued) {
                  return;
                }
                queued = true;
                raf = requestAnimationFrame(() => {
                  queued = false;
                  callback();
                });
              },
              cancel() {
                queued = false;
                if (raf) {
                  cancelAnimationFrame(raf);
                  raf = 0;
                }
              },
            };
          },
        },
      });

      const results = [];
      function assert(condition, label, details = "") {
        results.push({ pass: Boolean(condition), label, details });
      }
      async function wait(ms = 40) {
        await new Promise((resolve) => setTimeout(resolve, ms));
      }

      (async () => {
        emitState();
        await wait();

        assert(Boolean(document.getElementById(STYLE_ID)), "Style wurde injiziert");
        assert(throw1.classList.contains(HIT_KIND_CLASS.triple), "Triple wird markiert");
        assert(throw2.classList.contains(HIT_KIND_CLASS.double), "Double wird markiert");
        assert(throw3.classList.contains(HIT_KIND_CLASS.bull), "Bull wird markiert");
        assert(
          !throw4.classList.contains(HIT_KIND_CLASS.triple) &&
            !throw4.classList.contains(HIT_KIND_CLASS.double) &&
            !throw4.classList.contains(HIT_KIND_CLASS.bull),
          "Single wird nicht markiert"
        );

        cleanup();
        await wait();
        assert(!document.getElementById(STYLE_ID), "Style wurde bei Cleanup entfernt");
        assert(!throw1.classList.contains(HIT_KIND_CLASS.triple), "Triple Klasse bereinigt");
        assert(!throw2.classList.contains(HIT_KIND_CLASS.double), "Double Klasse bereinigt");
        assert(!throw3.classList.contains(HIT_KIND_CLASS.bull), "Bull Klasse bereinigt");

        const passed = results.filter((entry) => entry.pass).length;
        summaryNode.textContent = `${passed}/${results.length} Checks erfolgreich`;
        summaryNode.className = passed === results.length ? "pass" : "fail";

        results.forEach((entry) => {
          const item = document.createElement("li");
          item.className = entry.pass ? "pass" : "fail";
          item.innerHTML = `${entry.pass ? "PASS" : "FAIL"} <strong>${entry.label}</strong><br><code>${entry.details}</code>`;
          resultList.appendChild(item);
        });
      })();
    </script>
  </body>
</html>
