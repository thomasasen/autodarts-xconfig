<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Cricket State Harness</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background: #111827; color: #f8fafc; }
      .pass { color: #86efac; }
      .fail { color: #fca5a5; }
      code { color: #93c5fd; }
    </style>
  </head>
  <body>
    <h1>Cricket State Harness</h1>
    <p id="summary">Prüfung läuft ...</p>
    <ul id="results"></ul>

    <script type="module">
      import {
        applyThrowsToMarksByLabel,
        computeTargetStates,
        getTargetOrderByGameMode,
      } from "../../src/domain/cricket-rules.js";

      const summary = document.getElementById("summary");
      const list = document.getElementById("results");
      const results = [];

      function assert(condition, label, details = "") {
        results.push({ pass: Boolean(condition), label, details });
      }

      const tacticsOrder = getTargetOrderByGameMode("Tactics");
      const cricketOrder = getTargetOrderByGameMode("Cricket");

      const marks = applyThrowsToMarksByLabel({
        targetOrder: tacticsOrder,
        playerIndex: 1,
        baseMarksByLabel: {
          "20": [3, 0],
          "19": [0, 0],
          "18": [0, 0],
          "17": [0, 0],
          "16": [0, 0],
          "15": [0, 0],
          "14": [0, 0],
          "13": [0, 0],
          "12": [0, 0],
          "11": [0, 0],
          "10": [0, 0],
          BULL: [0, 0],
        },
        throws: [
          { segment: { name: "T20" } },
          { segment: { name: "D19" } },
          { segment: { name: "S25" } },
        ],
      });

      const states = computeTargetStates(marks, {
        gameMode: "Tactics",
        activePlayerIndex: 1,
        supportsTacticalHighlights: true,
        showDeadTargets: true,
      });

      assert(Array.isArray(cricketOrder) && cricketOrder.length === 7, "Cricket-Target-Reihenfolge erkannt");
      assert(Array.isArray(tacticsOrder) && tacticsOrder.length === 12, "Tactics-Target-Reihenfolge erkannt");
      assert(marks["20"][1] === 3, "T20 wird als 3 Marks angerechnet", JSON.stringify(marks["20"]));
      assert(marks["19"][1] === 2, "D19 wird als 2 Marks angerechnet", JSON.stringify(marks["19"]));
      assert(marks.BULL[1] === 1, "S25 wird als Single Bull erkannt", JSON.stringify(marks.BULL));
      assert(states.get("20")?.boardPresentation === "offense", "Board-State offense für aktiven Spieler auf 20");
      assert(states.get("20")?.cellStates?.[0]?.presentation === "pressure", "Gegnerzelle auf 20 ist pressure");

      const passed = results.filter((entry) => entry.pass).length;
      summary.textContent = `${passed}/${results.length} Checks erfolgreich`;
      summary.className = passed === results.length ? "pass" : "fail";

      results.forEach((entry) => {
        const li = document.createElement("li");
        li.className = entry.pass ? "pass" : "fail";
        li.innerHTML = `${entry.pass ? "PASS" : "FAIL"} <strong>${entry.label}</strong><br><code>${entry.details}</code>`;
        list.appendChild(li);
      });
    </script>
  </body>
</html>
