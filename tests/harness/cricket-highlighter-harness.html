<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Cricket Highlighter Harness</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; background: #111827; color: #f8fafc; }
      .pass { color: #86efac; }
      .fail { color: #fca5a5; }
      #layout { display: grid; grid-template-columns: 360px 1fr; gap: 16px; align-items: start; }
      #grid table { border-collapse: collapse; width: 100%; }
      #grid td { border: 1px solid #334155; padding: 6px; text-align: center; }
      #grid td.label-cell { text-align: left; font-weight: 700; }
      svg { width: 320px; height: 320px; background: #0b1220; border-radius: 12px; }
      .note { margin-top: 12px; color: #cbd5e1; }
    </style>
  </head>
  <body>
    <h1>Cricket Highlighter Harness</h1>
    <p id="summary">Wird geprüft …</p>

    <div id="layout">
      <svg viewBox="-170 -170 340 340" aria-label="board">
        <g id="board-root">
          <circle r="150" fill="#0f172a" stroke="#334155" />
          <circle r="113" fill="none" stroke="#1e293b" />
          <circle r="65" fill="none" stroke="#1e293b" />
          <circle r="11" fill="#1f2937" />
          <circle r="4" fill="#475569" />
          <g id="labels">
            <text x="0" y="-154" fill="#94a3b8" font-size="10" text-anchor="middle">20</text>
            <text x="45" y="-148" fill="#94a3b8" font-size="10" text-anchor="middle">1</text>
            <text x="84" y="-129" fill="#94a3b8" font-size="10" text-anchor="middle">18</text>
            <text x="115" y="-102" fill="#94a3b8" font-size="10" text-anchor="middle">4</text>
            <text x="138" y="-66" fill="#94a3b8" font-size="10" text-anchor="middle">13</text>
            <text x="150" y="-24" fill="#94a3b8" font-size="10" text-anchor="middle">6</text>
            <text x="150" y="20" fill="#94a3b8" font-size="10" text-anchor="middle">10</text>
            <text x="138" y="62" fill="#94a3b8" font-size="10" text-anchor="middle">15</text>
            <text x="116" y="98" fill="#94a3b8" font-size="10" text-anchor="middle">2</text>
            <text x="84" y="126" fill="#94a3b8" font-size="10" text-anchor="middle">17</text>
            <text x="45" y="145" fill="#94a3b8" font-size="10" text-anchor="middle">3</text>
            <text x="0" y="152" fill="#94a3b8" font-size="10" text-anchor="middle">19</text>
            <text x="-45" y="145" fill="#94a3b8" font-size="10" text-anchor="middle">7</text>
            <text x="-84" y="126" fill="#94a3b8" font-size="10" text-anchor="middle">16</text>
            <text x="-116" y="98" fill="#94a3b8" font-size="10" text-anchor="middle">8</text>
            <text x="-138" y="62" fill="#94a3b8" font-size="10" text-anchor="middle">11</text>
            <text x="-150" y="20" fill="#94a3b8" font-size="10" text-anchor="middle">14</text>
            <text x="-150" y="-24" fill="#94a3b8" font-size="10" text-anchor="middle">9</text>
            <text x="-138" y="-66" fill="#94a3b8" font-size="10" text-anchor="middle">12</text>
            <text x="-115" y="-102" fill="#94a3b8" font-size="10" text-anchor="middle">5</text>
          </g>
        </g>
      </svg>

      <div id="grid">
        <table>
          <tbody>
            <tr><td class="label-cell">20</td><td data-marks="3"></td><td data-marks="1"></td></tr>
            <tr><td class="label-cell">19</td><td data-marks="0"></td><td data-marks="3"></td></tr>
            <tr><td class="label-cell">18</td><td data-marks="3"></td><td data-marks="3"></td></tr>
            <tr><td class="label-cell">17</td><td data-marks="2"></td><td data-marks="0"></td></tr>
            <tr><td class="label-cell">16</td><td data-marks="0"></td><td data-marks="0"></td></tr>
            <tr><td class="label-cell">15</td><td data-marks="1"></td><td data-marks="2"></td></tr>
            <tr><td class="label-cell">BULL</td><td data-marks="0"></td><td data-marks="2"></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <p class="note">Erwartung: Overlay erscheint auf dem Board, danach wird beim Cleanup alles entfernt.</p>

    <script type="module">
      import { createDomGuards } from "../../src/core/dom-guards.js";
      import { createObserverRegistry } from "../../src/core/observer-registry.js";
      import { createListenerRegistry } from "../../src/core/listener-registry.js";
      import { createEventBus } from "../../src/core/event-bus.js";
      import { createRafScheduler } from "../../src/shared/raf-scheduler.js";
      import { initializeCricketHighlighter } from "../../src/features/cricket-highlighter/index.js";
      import { cricketRules } from "../../src/domain/cricket-rules.js";
      import { variantRules } from "../../src/domain/variant-rules.js";

      const summary = document.getElementById("summary");
      const domGuards = createDomGuards({ documentRef: document });
      const observers = createObserverRegistry();
      const listeners = createListenerRegistry();
      const eventBus = createEventBus();

      const gameState = {
        isCricketVariant() { return true; },
        getCricketGameModeNormalized() { return "cricket"; },
        getCricketGameMode() { return "Cricket"; },
        getActivePlayerIndex() { return 0; },
        getActiveThrows() { return [{ segment: { name: "T20" } }]; },
        getSnapshot() { return { match: { players: [{ id: "p1" }, { id: "p2" }] } }; },
        subscribe() { return () => {}; }
      };

      const config = {
        getFeatureConfig() {
          return {
            enabled: true,
            showDeadTargets: true,
            colorTheme: "standard",
            intensity: "normal"
          };
        }
      };

      const cleanup = initializeCricketHighlighter({
        documentRef: document,
        windowRef: window,
        eventBus,
        gameState,
        config,
        domain: { cricketRules, variantRules },
        domGuards,
        registries: { observers, listeners },
        helpers: { createRafScheduler: (cb, options = {}) => createRafScheduler(cb, options) }
      });

      const wait = (ms = 50) => new Promise((resolve) => setTimeout(resolve, ms));

      (async () => {
        await wait(120);
        const overlay = document.getElementById("ad-ext-cricket-targets");
        const style = document.getElementById("ad-ext-cricket-highlighter-style");
        const okBeforeCleanup = Boolean(overlay) && Boolean(style);

        cleanup();
        await wait(40);

        const overlayAfter = document.getElementById("ad-ext-cricket-targets");
        const styleAfter = document.getElementById("ad-ext-cricket-highlighter-style");
        const okAfterCleanup = !overlayAfter && !styleAfter;

        const passed = okBeforeCleanup && okAfterCleanup;
        summary.textContent = passed
          ? "PASS: Overlay erzeugt und sauber entfernt."
          : "FAIL: Overlay/Style-Verhalten prüfen.";
        summary.className = passed ? "pass" : "fail";
      })();
    </script>
  </body>
</html>
