<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Checkout Board Targets Harness</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        background: #111;
        color: #f5f5f5;
      }
      .pass {
        color: #86efac;
      }
      .fail {
        color: #fca5a5;
      }
      #board {
        width: 320px;
        height: 320px;
        border: 1px solid #333;
        background: radial-gradient(circle at center, #222 0%, #111 70%);
      }
      .suggestion {
        margin: 8px 0 12px;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <h1>Checkout Board Targets Harness</h1>
    <p id="summary">Running...</p>
    <ul id="results"></ul>

    <div id="ad-ext-game-variant">X01</div>
    <div class="suggestion">T20 D10</div>
    <svg id="board" viewBox="-220 -220 440 440">
      <g id="board-group">
        <circle r="170" fill="#1f1f1f"></circle>
        <circle r="20" fill="#2f2f2f"></circle>
        <text x="0" y="-182" fill="#ddd" text-anchor="middle">20</text>
        <text x="0" y="194" fill="#ddd" text-anchor="middle">3</text>
      </g>
    </svg>

    <script type="module">
      import { createDomGuards } from "../../src/core/dom-guards.js";
      import { createObserverRegistry } from "../../src/core/observer-registry.js";
      import { createListenerRegistry } from "../../src/core/listener-registry.js";
      import { initializeCheckoutBoardTargets } from "../../src/features/checkout-board-targets/index.js";
      import { variantRules } from "../../src/domain/variant-rules.js";
      import { x01Rules } from "../../src/domain/x01-rules.js";

      const summaryNode = document.getElementById("summary");
      const resultList = document.getElementById("results");
      const variantNode = document.getElementById("ad-ext-game-variant");
      const suggestionNode = document.querySelector(".suggestion");

      const observers = createObserverRegistry();
      const listeners = createListenerRegistry();
      const domGuards = createDomGuards({ documentRef: document });
      const subscribers = new Set();

      const gameState = {
        isX01Variant() {
          return variantRules.isX01VariantText(variantNode.textContent || "", {
            allowNumeric: true,
            allowMissing: false,
            allowEmpty: false,
          });
        },
        subscribe(listener) {
          if (typeof listener !== "function") {
            return () => {};
          }
          subscribers.add(listener);
          return () => subscribers.delete(listener);
        },
      };

      function emitState() {
        subscribers.forEach((listener) => {
          try {
            listener();
          } catch (_) {}
        });
      }

      const config = {
        getFeatureConfig() {
          return {
            enabled: true,
            effect: "pulse",
            singleRing: "both",
            colorTheme: "violet",
            outlineIntensity: "standard",
          };
        },
      };

      const cleanup = initializeCheckoutBoardTargets({
        documentRef: document,
        windowRef: window,
        domGuards,
        registries: { observers, listeners },
        gameState,
        config,
        domain: { variantRules, x01Rules },
        helpers: {
          createRafScheduler(callback) {
            let raf = 0;
            let queued = false;
            return {
              schedule() {
                if (queued) {
                  return;
                }
                queued = true;
                raf = requestAnimationFrame(() => {
                  queued = false;
                  callback();
                });
              },
              cancel() {
                queued = false;
                if (raf) {
                  cancelAnimationFrame(raf);
                  raf = 0;
                }
              },
            };
          },
        },
      });

      const results = [];
      function assert(condition, label, details = "") {
        results.push({ pass: Boolean(condition), label, details });
      }
      async function wait(ms = 50) {
        await new Promise((resolve) => setTimeout(resolve, ms));
      }

      (async () => {
        emitState();
        await wait();

        const overlay = document.getElementById("ad-ext-checkout-targets");
        assert(Boolean(overlay), "overlay node is injected");
        assert((overlay?.children?.length || 0) > 0, "targets are rendered for X01 suggestion");

        variantNode.textContent = "Cricket";
        emitState();
        await wait();
        assert((overlay?.children?.length || 0) === 0, "overlay is cleared outside X01");

        cleanup();
        await wait();
        assert(!document.getElementById("ad-ext-checkout-board-style"), "style node is cleaned up");

        const passed = results.filter((entry) => entry.pass).length;
        summaryNode.textContent = `${passed}/${results.length} checks passed`;
        summaryNode.className = passed === results.length ? "pass" : "fail";

        results.forEach((entry) => {
          const item = document.createElement("li");
          item.className = entry.pass ? "pass" : "fail";
          item.innerHTML = `${entry.pass ? "PASS" : "FAIL"} <strong>${entry.label}</strong><br><code>${entry.details}</code>`;
          resultList.appendChild(item);
        });
      })();
    </script>
  </body>
</html>
