<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Turn Start Sweep Harness</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        background: #111;
        color: #f5f5f5;
      }
      .pass {
        color: #86efac;
      }
      .fail {
        color: #fca5a5;
      }
      .player-row {
        margin: 8px 0;
        padding: 10px 12px;
        border: 1px solid #2f2f2f;
        border-radius: 8px;
      }
      .ad-ext-player-active {
        border-color: #facc15;
      }
    </style>
  </head>
  <body>
    <h1>Turn Start Sweep Harness</h1>
    <p id="summary">Running...</p>
    <ul id="results"></ul>

    <div id="player-a" class="player-row ad-ext-player ad-ext-player-active">Spieler A</div>
    <div id="player-b" class="player-row ad-ext-player">Spieler B</div>

    <script type="module">
      import { createDomGuards } from "../../src/core/dom-guards.js";
      import { createObserverRegistry } from "../../src/core/observer-registry.js";
      import { createListenerRegistry } from "../../src/core/listener-registry.js";
      import { initializeTurnStartSweep } from "../../src/features/turn-start-sweep/index.js";
      import { SWEEP_CLASS, STYLE_ID } from "../../src/features/turn-start-sweep/style.js";

      const summaryNode = document.getElementById("summary");
      const resultList = document.getElementById("results");
      const playerA = document.getElementById("player-a");
      const playerB = document.getElementById("player-b");
      const subscribers = new Set();

      const gameState = {
        subscribe(listener) {
          if (typeof listener !== "function") {
            return () => {};
          }
          subscribers.add(listener);
          return () => subscribers.delete(listener);
        },
      };

      function emitState() {
        subscribers.forEach((listener) => {
          try {
            listener();
          } catch (_) {}
        });
      }

      const cleanup = initializeTurnStartSweep({
        documentRef: document,
        windowRef: window,
        domGuards: createDomGuards({ documentRef: document }),
        registries: {
          observers: createObserverRegistry(),
          listeners: createListenerRegistry(),
        },
        gameState,
        config: {
          getFeatureConfig() {
            return {
              enabled: true,
              durationMs: 300,
              sweepStyle: "standard",
            };
          },
        },
        helpers: {
          createRafScheduler(callback) {
            let queued = false;
            let raf = 0;
            return {
              schedule() {
                if (queued) {
                  return;
                }
                queued = true;
                raf = requestAnimationFrame(() => {
                  queued = false;
                  callback();
                });
              },
              cancel() {
                queued = false;
                if (raf) {
                  cancelAnimationFrame(raf);
                  raf = 0;
                }
              },
            };
          },
        },
      });

      const results = [];
      function assert(condition, label, details = "") {
        results.push({ pass: Boolean(condition), label, details });
      }
      async function wait(ms = 40) {
        await new Promise((resolve) => setTimeout(resolve, ms));
      }

      (async () => {
        emitState();
        await wait();

        assert(Boolean(document.getElementById(STYLE_ID)), "Style wurde injiziert");
        assert(playerA.classList.contains(SWEEP_CLASS), "Initialer Sweep auf aktivem Spieler");

        playerA.classList.remove("ad-ext-player-active");
        playerB.classList.add("ad-ext-player-active");
        emitState();
        await wait();
        assert(playerB.classList.contains(SWEEP_CLASS), "Sweep bei Spielerwechsel ausgelost");

        cleanup();
        await wait();
        assert(!document.getElementById(STYLE_ID), "Style wurde bei Cleanup entfernt");
        assert(!playerA.classList.contains(SWEEP_CLASS), "Klasse auf Spieler A bereinigt");
        assert(!playerB.classList.contains(SWEEP_CLASS), "Klasse auf Spieler B bereinigt");

        const passed = results.filter((entry) => entry.pass).length;
        summaryNode.textContent = `${passed}/${results.length} Checks erfolgreich`;
        summaryNode.className = passed === results.length ? "pass" : "fail";

        results.forEach((entry) => {
          const item = document.createElement("li");
          item.className = entry.pass ? "pass" : "fail";
          item.innerHTML = `${entry.pass ? "PASS" : "FAIL"} <strong>${entry.label}</strong><br><code>${entry.details}</code>`;
          resultList.appendChild(item);
        });
      })();
    </script>
  </body>
</html>
