<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Remove Darts Notification Harness</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; background: #111827; color: #f8fafc; }
      .pass { color: #86efac; }
      .fail { color: #fca5a5; }
      .adt-remove {
        margin-top: 16px;
        width: 360px;
        padding: 14px;
        background: #1f2937;
        color: #f8fafc;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Remove Darts Notification Harness</h1>
    <p id="summary">Prüfung läuft ...</p>

    <div class="adt-remove">Removing Darts</div>

    <script type="module">
      import { createDomGuards } from "../../src/core/dom-guards.js";
      import { createObserverRegistry } from "../../src/core/observer-registry.js";
      import { createRafScheduler } from "../../src/shared/raf-scheduler.js";
      import { initializeRemoveDartsNotification } from "../../src/features/remove-darts-notification/index.js";

      const summary = document.getElementById("summary");

      const cleanup = initializeRemoveDartsNotification({
        documentRef: document,
        windowRef: window,
        domGuards: createDomGuards({ documentRef: document }),
        registries: {
          observers: createObserverRegistry(),
        },
        config: {
          getFeatureConfig() {
            return {
              enabled: true,
              imageSize: "standard",
              pulseAnimation: true,
              pulseScale: 1.04,
            };
          },
        },
        helpers: {
          createRafScheduler: (cb, options = {}) => createRafScheduler(cb, options),
        },
      });

      const wait = (ms = 50) => new Promise((resolve) => setTimeout(resolve, ms));

      (async () => {
        await wait(120);

        const beforeImage = Boolean(document.querySelector(".ad-ext-takeout-image"));
        const beforeStyle = Boolean(document.getElementById("ad-ext-remove-darts-notification-style"));

        cleanup();
        await wait(40);

        const afterImage = Boolean(document.querySelector(".ad-ext-takeout-image"));
        const afterStyle = Boolean(document.getElementById("ad-ext-remove-darts-notification-style"));

        const passed = beforeImage && beforeStyle && !afterImage && !afterStyle;
        summary.textContent = passed
          ? "PASS: Hinweis ersetzt und wieder bereinigt."
          : "FAIL: Remove-Darts-Hinweis prüfen.";
        summary.className = passed ? "pass" : "fail";
      })();
    </script>
  </body>
</html>
