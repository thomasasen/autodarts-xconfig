<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Style Checkout Suggestions Harness</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        background: #101010;
        color: #f5f5f5;
      }
      .pass {
        color: #86efac;
      }
      .fail {
        color: #fca5a5;
      }
      .suggestion {
        display: inline-block;
        padding: 20px 24px;
        margin-top: 10px;
        background: #1d1d1d;
      }
    </style>
  </head>
  <body>
    <h1>Style Checkout Suggestions Harness</h1>
    <p id="summary">Running...</p>
    <ul id="results"></ul>

    <div id="ad-ext-game-variant">X01</div>
    <div class="suggestion">T20 D16</div>

    <script type="module">
      import { createDomGuards } from "../../src/core/dom-guards.js";
      import { createObserverRegistry } from "../../src/core/observer-registry.js";
      import { createListenerRegistry } from "../../src/core/listener-registry.js";
      import { initializeStyleCheckoutSuggestions } from "../../src/features/style-checkout-suggestions/index.js";
      import { variantRules } from "../../src/domain/variant-rules.js";
      import { STYLE_ID } from "../../src/features/style-checkout-suggestions/style.js";

      const summaryNode = document.getElementById("summary");
      const resultList = document.getElementById("results");
      const variantNode = document.getElementById("ad-ext-game-variant");
      const suggestionNode = document.querySelector(".suggestion");

      const subscribers = new Set();
      const gameState = {
        isX01Variant() {
          return variantRules.isX01VariantText(variantNode.textContent || "", {
            allowNumeric: true,
            allowMissing: false,
            allowEmpty: false,
          });
        },
        subscribe(listener) {
          if (typeof listener !== "function") {
            return () => {};
          }
          subscribers.add(listener);
          return () => subscribers.delete(listener);
        },
      };
      function emitState() {
        subscribers.forEach((listener) => {
          try {
            listener();
          } catch (_) {}
        });
      }

      const config = {
        getFeatureConfig() {
          return {
            enabled: true,
            style: "stripe",
            labelText: "CHECKOUT",
            colorTheme: "amber",
          };
        },
      };

      const cleanup = initializeStyleCheckoutSuggestions({
        documentRef: document,
        windowRef: window,
        domGuards: createDomGuards({ documentRef: document }),
        registries: {
          observers: createObserverRegistry(),
          listeners: createListenerRegistry(),
        },
        gameState,
        config,
        domain: { variantRules },
        helpers: {
          createRafScheduler(callback) {
            let queued = false;
            let raf = 0;
            return {
              schedule() {
                if (queued) {
                  return;
                }
                queued = true;
                raf = requestAnimationFrame(() => {
                  queued = false;
                  callback();
                });
              },
              cancel() {
                queued = false;
                if (raf) {
                  cancelAnimationFrame(raf);
                  raf = 0;
                }
              },
            };
          },
        },
      });

      const results = [];
      function assert(condition, label, details = "") {
        results.push({ pass: Boolean(condition), label, details });
      }
      async function wait(ms = 40) {
        await new Promise((resolve) => setTimeout(resolve, ms));
      }

      (async () => {
        emitState();
        await wait();

        assert(Boolean(document.getElementById(STYLE_ID)), "style node is injected");
        assert(
          suggestionNode.classList.contains("ad-ext-checkout-suggestion"),
          "base class is applied in X01"
        );
        assert(
          suggestionNode.classList.contains("ad-ext-checkout-suggestion--stripe"),
          "selected style class is applied"
        );

        variantNode.textContent = "Cricket";
        emitState();
        await wait();
        assert(
          !suggestionNode.classList.contains("ad-ext-checkout-suggestion"),
          "classes are removed outside X01"
        );

        cleanup();
        await wait();
        assert(!document.getElementById(STYLE_ID), "style node is cleaned up");

        const passed = results.filter((entry) => entry.pass).length;
        summaryNode.textContent = `${passed}/${results.length} checks passed`;
        summaryNode.className = passed === results.length ? "pass" : "fail";

        results.forEach((entry) => {
          const item = document.createElement("li");
          item.className = entry.pass ? "pass" : "fail";
          item.innerHTML = `${entry.pass ? "PASS" : "FAIL"} <strong>${entry.label}</strong><br><code>${entry.details}</code>`;
          resultList.appendChild(item);
        });
      })();
    </script>
  </body>
</html>
