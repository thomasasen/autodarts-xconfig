<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Cricket Target Highlighter Harness</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; background: #0f172a; color: #f8fafc; }
      .pass { color: #86efac; }
      .fail { color: #fca5a5; }
      #layout { display: grid; grid-template-columns: 360px 1fr; gap: 16px; align-items: start; }
      #grid table { border-collapse: collapse; width: 100%; }
      #grid td { border: 1px solid #334155; padding: 6px; text-align: center; }
      #grid td.label-cell { text-align: left; font-weight: 700; }
      svg { width: 320px; height: 320px; background: #020617; border-radius: 12px; }
    </style>
  </head>
  <body>
    <h1>Cricket Target Highlighter Harness</h1>
    <p id="summary">Prüfung läuft ...</p>

    <div id="layout">
      <svg viewBox="-170 -170 340 340" aria-label="board">
        <g id="board-root">
          <circle r="150" fill="#0f172a" stroke="#334155" />
          <circle r="113" fill="none" stroke="#1e293b" />
          <circle r="65" fill="none" stroke="#1e293b" />
          <circle r="11" fill="#1f2937" />
          <circle r="4" fill="#475569" />
          <g>
            <text x="0" y="-154" fill="#94a3b8" font-size="10" text-anchor="middle">20</text>
            <text x="84" y="-129" fill="#94a3b8" font-size="10" text-anchor="middle">18</text>
            <text x="138" y="-66" fill="#94a3b8" font-size="10" text-anchor="middle">13</text>
            <text x="150" y="20" fill="#94a3b8" font-size="10" text-anchor="middle">10</text>
            <text x="84" y="126" fill="#94a3b8" font-size="10" text-anchor="middle">17</text>
            <text x="0" y="152" fill="#94a3b8" font-size="10" text-anchor="middle">19</text>
            <text x="-84" y="126" fill="#94a3b8" font-size="10" text-anchor="middle">16</text>
            <text x="-138" y="-66" fill="#94a3b8" font-size="10" text-anchor="middle">12</text>
          </g>
        </g>
      </svg>

      <div id="grid">
        <table>
          <tbody>
            <tr><td class="label-cell">20</td><td data-marks="3">3</td><td data-marks="0">0</td></tr>
            <tr><td class="label-cell">19</td><td data-marks="0">0</td><td data-marks="3">3</td></tr>
            <tr><td class="label-cell">18</td><td data-marks="3">3</td><td data-marks="3">3</td></tr>
            <tr><td class="label-cell">17</td><td data-marks="1">1</td><td data-marks="0">0</td></tr>
            <tr><td class="label-cell">16</td><td data-marks="0">0</td><td data-marks="0">0</td></tr>
            <tr><td class="label-cell">15</td><td data-marks="2">2</td><td data-marks="0">0</td></tr>
            <tr><td class="label-cell">14</td><td data-marks="0">0</td><td data-marks="0">0</td></tr>
            <tr><td class="label-cell">13</td><td data-marks="0">0</td><td data-marks="0">0</td></tr>
            <tr><td class="label-cell">12</td><td data-marks="0">0</td><td data-marks="0">0</td></tr>
            <tr><td class="label-cell">11</td><td data-marks="0">0</td><td data-marks="0">0</td></tr>
            <tr><td class="label-cell">10</td><td data-marks="0">0</td><td data-marks="0">0</td></tr>
            <tr><td class="label-cell">BULL</td><td data-marks="0">0</td><td data-marks="2">2</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <script type="module">
      import { createDomGuards } from "../../src/core/dom-guards.js";
      import { createObserverRegistry } from "../../src/core/observer-registry.js";
      import { createListenerRegistry } from "../../src/core/listener-registry.js";
      import { createEventBus } from "../../src/core/event-bus.js";
      import { createRafScheduler } from "../../src/shared/raf-scheduler.js";
      import { initializeCricketHighlighter } from "../../src/features/cricket-highlighter/index.js";
      import { initializeCricketGridFx } from "../../src/features/cricket-grid-fx/index.js";
      import { cricketRules } from "../../src/domain/cricket-rules.js";
      import { variantRules } from "../../src/domain/variant-rules.js";

      const summary = document.getElementById("summary");
      const eventBus = createEventBus();

      const gameState = {
        isCricketVariant() { return true; },
        getCricketGameModeNormalized() { return "tactics"; },
        getCricketGameMode() { return "Tactics"; },
        getActivePlayerIndex() { return 0; },
        getActiveThrows() { return [{ segment: { name: "T20" } }]; },
        getSnapshot() { return { match: { players: [{ id: "a" }, { id: "b" }] } }; },
        subscribe() { return () => {}; }
      };

      const baseContext = {
        documentRef: document,
        windowRef: window,
        eventBus,
        gameState,
        domain: { cricketRules, variantRules },
        domGuards: createDomGuards({ documentRef: document }),
        registries: {
          observers: createObserverRegistry(),
          listeners: createListenerRegistry(),
        },
        helpers: {
          createRafScheduler: (cb, options = {}) => createRafScheduler(cb, options),
        },
      };

      const cleanupHighlighter = initializeCricketHighlighter({
        ...baseContext,
        config: {
          getFeatureConfig() {
            return {
              enabled: true,
              showDeadTargets: true,
              colorTheme: "standard",
              intensity: "normal",
            };
          },
        },
      });

      const cleanupGridFx = initializeCricketGridFx({
        ...baseContext,
        config: {
          getFeatureConfig() {
            return {
              enabled: true,
              rowWave: true,
              colorTheme: "standard",
              intensity: "normal",
            };
          },
        },
      });

      const wait = (ms = 50) => new Promise((resolve) => setTimeout(resolve, ms));

      (async () => {
        await wait(160);

        const hasBoardOverlay = Boolean(document.getElementById("ad-ext-cricket-targets"));
        const hasGridFxStyle = Boolean(document.getElementById("ad-ext-cricket-grid-fx-style"));

        cleanupGridFx();
        cleanupHighlighter();

        await wait(40);

        const overlayAfter = Boolean(document.getElementById("ad-ext-cricket-targets"));
        const styleAfter = Boolean(document.getElementById("ad-ext-cricket-grid-fx-style"));

        const passed = hasBoardOverlay && hasGridFxStyle && !overlayAfter && !styleAfter;
        summary.textContent = passed
          ? "PASS: Highlighter + Grid FX aktiv und Cleanup sauber."
          : "FAIL: Overlay/Grid-FX prüfen.";
        summary.className = passed ? "pass" : "fail";
      })();
    </script>
  </body>
</html>
