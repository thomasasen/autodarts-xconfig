<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Turn Points Count Harness</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; background: #0f172a; color: #f8fafc; }
      .pass { color: #86efac; }
      .fail { color: #fca5a5; }
      .card { margin-top: 12px; padding: 14px; border: 1px solid #334155; border-radius: 12px; max-width: 420px; }
      .ad-ext-turn-points { font-size: 48px; font-weight: 700; margin: 0; }
      button { margin-top: 12px; padding: 8px 12px; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: #f8fafc; }
    </style>
  </head>
  <body>
    <h1>Turn Points Count Harness</h1>
    <p id="summary">Wird geprüft …</p>

    <div class="card">
      <p class="ad-ext-turn-points" id="turnPoints">60</p>
      <button id="change">Punkte ändern (60 → 100)</button>
    </div>

    <script type="module">
      import { createDomGuards } from "../../src/core/dom-guards.js";
      import { createObserverRegistry } from "../../src/core/observer-registry.js";
      import { createListenerRegistry } from "../../src/core/listener-registry.js";
      import { createEventBus } from "../../src/core/event-bus.js";
      import { createRafScheduler } from "../../src/shared/raf-scheduler.js";
      import { initializeTurnPointsCount } from "../../src/features/turn-points-count/index.js";

      const summary = document.getElementById("summary");
      const turnPoints = document.getElementById("turnPoints");
      const changeButton = document.getElementById("change");

      const domGuards = createDomGuards({ documentRef: document });
      const observers = createObserverRegistry();
      const listeners = createListenerRegistry();
      const eventBus = createEventBus();

      const gameState = {
        subscribe() { return () => {}; }
      };

      const config = {
        getFeatureConfig() {
          return {
            enabled: true,
            durationMs: 416
          };
        }
      };

      const cleanup = initializeTurnPointsCount({
        documentRef: document,
        windowRef: window,
        eventBus,
        gameState,
        config,
        domGuards,
        registries: { observers, listeners },
        helpers: { createRafScheduler: (cb, options = {}) => createRafScheduler(cb, options) }
      });

      const wait = (ms = 60) => new Promise((resolve) => setTimeout(resolve, ms));

      changeButton.addEventListener("click", async () => {
        turnPoints.textContent = "100";
        eventBus.emit("game-state:updated", {});

        await wait(700);
        const ok = Number(turnPoints.textContent) === 100;
        summary.textContent = ok
          ? "PASS: Punkte wurden animiert aktualisiert."
          : "FAIL: Punktewert blieb unerwartet.";
        summary.className = ok ? "pass" : "fail";
      });

      window.addEventListener("beforeunload", () => {
        cleanup();
      });
    </script>
  </body>
</html>
