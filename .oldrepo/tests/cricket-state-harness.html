<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cricket / Tactics State Harness</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        background: #111;
        color: #f5f5f5;
      }

      .pass {
        color: #86efac;
      }

      .fail {
        color: #fca5a5;
      }

      code {
        color: #93c5fd;
      }
    </style>
    <script src="../Animation/autodarts-cricket-state-shared.js"></script>
  </head>
  <body>
    <h1>Cricket / Tactics State Harness</h1>
    <p id="summary">Running…</p>
    <ul id="results"></ul>

    <script>
      (function () {
        "use strict";

        const helper = window.autodartsCricketStateShared;
        const CRICKET_TARGETS = helper.CRICKET_TARGET_ORDER || [
          "20",
          "19",
          "18",
          "17",
          "16",
          "15",
          "BULL",
        ];
        const TACTICS_TARGETS = helper.TACTICS_TARGET_ORDER || [
          "20",
          "19",
          "18",
          "17",
          "16",
          "15",
          "14",
          "13",
          "12",
          "11",
          "10",
          "BULL",
        ];
        const results = [];

        function markCell(mark, textOverride, options) {
          const config = options || {};
          const cell = document.createElement("div");
          cell.className = "player-cell";
          if (config.includeAttribute !== false) {
            cell.setAttribute("data-marks", String(mark));
          }
          if (typeof textOverride === "string") {
            cell.textContent = textOverride;
          }
          return cell;
        }

        function buildLinearRoot(targetOrder, markSets, labelFormatter) {
          const root = document.createElement("div");
          root.className = "grid-root";
          targetOrder.forEach((label, index) => {
            const labelCell = document.createElement("div");
            labelCell.className = "label-cell";
            labelCell.textContent = labelFormatter ? labelFormatter(label, index) : label;
            root.appendChild(labelCell);

            markSets[index].forEach((mark) => {
              root.appendChild(markCell(mark));
            });
          });
          return root;
        }

        function buildLinearTextRoot(targetOrder, textSets) {
          const root = document.createElement("div");
          root.className = "grid-root";
          targetOrder.forEach((label, index) => {
            const labelCell = document.createElement("div");
            labelCell.className = "label-cell";
            labelCell.textContent = label;
            root.appendChild(labelCell);

            textSets[index].forEach((text) => {
              root.appendChild(markCell(0, text, { includeAttribute: false }));
            });
          });
          return root;
        }

        function buildSingleColumnLinearRoot(targetOrder, markValues) {
          const root = document.createElement("div");
          root.className = "grid-root";
          targetOrder.forEach((label, index) => {
            const labelCell = document.createElement("div");
            labelCell.className = "label-cell";
            labelCell.textContent = label;
            root.appendChild(labelCell);
            root.appendChild(markCell(markValues[index]));
          });
          return root;
        }

        function buildNestedRowRoot(targetOrder, markSets) {
          const root = document.createElement("div");
          root.className = "nested-root";
          targetOrder.forEach((label, index) => {
            const row = document.createElement("div");
            row.className = "row";

            const labelCell = document.createElement("div");
            labelCell.className = "label-cell";
            const labelNode = document.createElement("span");
            labelNode.textContent = label;
            labelCell.appendChild(labelNode);
            row.appendChild(labelCell);

            const playerWrapper = document.createElement("div");
            playerWrapper.className = "player-wrapper";
            markSets[index].forEach((mark) => {
              playerWrapper.appendChild(markCell(mark));
            });
            row.appendChild(playerWrapper);
            root.appendChild(row);
          });
          return root;
        }

        function buildDecoratedLabelRoot(targetOrder, markSets) {
          const root = document.createElement("div");
          root.className = "decorated-root";
          targetOrder.forEach((label, index) => {
            const labelCell = document.createElement("div");
            labelCell.className = "label-cell";
            const labelNode = document.createElement("span");
            labelNode.className = "ad-ext-crfx-badge";
            labelNode.textContent = label;
            labelCell.appendChild(labelNode);

            const wave = document.createElement("span");
            wave.className = "ad-ext-crfx-row-wave";
            wave.textContent = "ignored";
            labelCell.appendChild(wave);

            const delta = document.createElement("span");
            delta.className = "ad-ext-crfx-delta";
            delta.textContent = "+1";
            labelCell.appendChild(delta);

            root.appendChild(labelCell);
            markSets[index].forEach((mark) => {
              root.appendChild(markCell(mark));
            });
          });
          return root;
        }

        function buildCombinedLabelPlayerRoot(targetOrder, markSets, options) {
          const config = options || {};
          const labelPlayerIndex = Number.isFinite(config.labelPlayerIndex)
            ? config.labelPlayerIndex
            : 0;
          const root = document.createElement("div");
          root.className = "combined-label-player-root";
          targetOrder.forEach((label, index) => {
            const markValues = Array.isArray(markSets[index]) ? markSets[index] : [];
            const labelCell = document.createElement("div");
            labelCell.className = "label-cell";
            labelCell.setAttribute(
              "data-marks",
              String(markValues[labelPlayerIndex] ?? 0)
            );

            const labelNode = document.createElement("span");
            labelNode.className = "label-text";
            labelNode.textContent = label;
            labelCell.appendChild(labelNode);

            const markSlot = document.createElement("span");
            markSlot.className = "label-mark-slot";
            const markValue = markValues[labelPlayerIndex] ?? 0;
            if (markValue > 0) {
              const icon = document.createElement("img");
              icon.setAttribute("alt", String(markValue));
              markSlot.appendChild(icon);
            }
            labelCell.appendChild(markSlot);

            root.appendChild(labelCell);
            markValues.forEach((mark, playerIndex) => {
              if (playerIndex === labelPlayerIndex) {
                return;
              }
              root.appendChild(markCell(mark));
            });
          });
          return root;
        }

        function mountPlayerStrip(playerCount, activePlayerIndex, options) {
          const config = options || {};
          const activeIndices = new Set(
            Array.isArray(config.activePlayerIndices)
              ? config.activePlayerIndices.filter((value) => Number.isFinite(value))
              : Number.isFinite(activePlayerIndex)
                ? [activePlayerIndex]
                : []
          );
          const players = Array.isArray(config.players) && config.players.length
            ? config.players.slice(0, playerCount)
            : Array.from({ length: playerCount }, (_, index) => ({
                id: `player-${index + 1}`,
                name: `P${index + 1}`,
              }));
          const domOrder = Array.isArray(config.domOrder) && config.domOrder.length === players.length
            ? config.domOrder
            : players.map((_, index) => index);
          const visualOrder = Array.isArray(config.visualOrder) && config.visualOrder.length === players.length
            ? config.visualOrder
            : players.map((_, index) => index);
          const host = document.createElement("div");
          host.id = "ad-ext-player-display";
          host.className = "ad-ext-player-strip";
          host.style.display = config.visible === false ? "none" : "flex";
          host.style.gap = "8px";

          domOrder.forEach((playerIndex) => {
            const playerData = players[playerIndex] || {};
            const wrapper = document.createElement("div");
            wrapper.className = `player-wrap player-wrap-${playerIndex}`;
            wrapper.style.display = "flex";
            wrapper.style.order = String(
              Number.isFinite(visualOrder[playerIndex]) ? visualOrder[playerIndex] : playerIndex
            );
            const player = document.createElement("div");
            player.className = "ad-ext-player";
            player.style.width = "80px";
            player.style.height = "24px";
            if (config.includeIds !== false && playerData.id) {
              player.setAttribute("data-player-id", String(playerData.id));
            }
            const nameNode = document.createElement("span");
            nameNode.className = "ad-ext-player-name";
            nameNode.textContent = playerData.name || `P${playerIndex + 1}`;
            player.appendChild(nameNode);
            if (activeIndices.has(playerIndex)) {
              player.classList.add("ad-ext-player-active");
            }
            wrapper.appendChild(player);
            host.appendChild(wrapper);
          });

          const hiddenActiveDuplicates = Number(config.hiddenActiveDuplicates) || 0;
          Array.from({ length: hiddenActiveDuplicates }, (_, index) => index).forEach((index) => {
            const hiddenWrap = document.createElement("div");
            hiddenWrap.style.display = "none";
            const player = document.createElement("div");
            player.className = "ad-ext-player ad-ext-player-active";
            player.textContent = `H${index + 1}`;
            hiddenWrap.appendChild(player);
            host.appendChild(hiddenWrap);
          });

          const extraVisiblePlayers = Number(config.extraVisiblePlayers) || 0;
          Array.from({ length: extraVisiblePlayers }, (_, index) => index).forEach((index) => {
            const player = document.createElement("div");
            player.className = "ad-ext-player";
            player.textContent = `E${index + 1}`;
            player.style.width = "80px";
            player.style.height = "24px";
            host.appendChild(player);
          });

          document.body.appendChild(host);
          return host;
        }

        function fakeGameState(activePlayerIndex, scoringMode, gameMode, options) {
          const config = options || {};
          const playerCount =
            Number.isFinite(config.domPlayerCount) && config.domPlayerCount >= 0
              ? config.domPlayerCount
              : Number.isFinite(config.playerCount) && config.playerCount > 0
                ? config.playerCount
                : 2;
          const state = {
            getActivePlayerIndex: function () {
              return activePlayerIndex;
            },
            getCricketMode: function () {
              return scoringMode || "";
            },
            getActiveThrows: function () {
              return Array.isArray(config.activeThrows) ? config.activeThrows : [];
            },
            getState: function () {
              if (config.matchState) {
                return {
                  match: config.matchState,
                  updatedAt: 1,
                  source: "test",
                };
              }
              return {
                match: {
                  players: Array.from({ length: playerCount }, (_, index) => ({
                    id: `player-${index + 1}`,
                  })),
                  turns: [],
                },
                updatedAt: 1,
                source: "test",
              };
            },
          };

          if (config.includeGameMode !== false) {
            state.getCricketGameMode = function () {
              return gameMode || "";
            };
          }
          if (config.includeFamilyVariant !== false) {
            state.isCricketVariant = function () {
              return true;
            };
          }

          return state;
        }

        function buildState(root, playerCount, activePlayerIndex, scoringMode, gameMode, options) {
          const config = options || {};
          const domPlayers =
            Number.isFinite(config.domPlayerCount) && config.domPlayerCount >= 0
              ? mountPlayerStrip(config.domPlayerCount, config.domActivePlayerIndex, {
                  visible: config.domVisible,
                  hiddenActiveDuplicates: config.hiddenActiveDuplicates,
                  extraVisiblePlayers: config.extraVisiblePlayers,
                  players: config.domPlayers,
                  domOrder: config.domOrder,
                  visualOrder: config.visualOrder,
                  includeIds: config.includeIds,
                  activePlayerIndices: config.domActivePlayerIndices,
                })
              : null;

          try {
            const snapshot = helper.buildGridSnapshot({
              root,
              playerCount,
              gameStateShared: fakeGameState(
                activePlayerIndex,
                scoringMode,
                gameMode,
                Object.assign({}, options, { playerCount })
              ),
            });
            if (!snapshot) {
              return { snapshot: null, states: null };
            }
            return {
              snapshot,
              states: helper.computeTargetStates(snapshot, {
                showDeadTargets: true,
              }),
            };
          } finally {
            if (domPlayers) {
              domPlayers.remove();
            }
          }
        }

        function mountGridRoot(root, options) {
          const config = options || {};
          root.dataset.testGridRoot = "true";
          root.style.width = "420px";
          root.style.marginTop = "8px";
          if (config.visible === false) {
            root.style.display = "none";
          }
          document.body.appendChild(root);
          return root;
        }

        function cleanupMountedGridRoots() {
          document.querySelectorAll("[data-test-grid-root='true']").forEach((node) => {
            node.remove();
          });
        }

        function createUniformMarkSets(targetOrder, producer) {
          return targetOrder.map((label, index) => producer(label, index));
        }

        function createThrowForLabel(label, multiplier) {
          const normalizedLabel = String(label || "").toUpperCase();
          const resolvedMultiplier = Number.isFinite(multiplier)
            ? Math.max(1, Math.min(3, Math.round(multiplier)))
            : 1;
          if (normalizedLabel === "BULL") {
            const isDoubleBull = resolvedMultiplier >= 2;
            return {
              segment: {
                name: isDoubleBull ? "DBULL" : "S25",
                number: 25,
                multiplier: isDoubleBull ? 2 : 1,
                bed: isDoubleBull ? "Inner Bull" : "Outer Bull",
              },
            };
          }
          const numeric = Number(label);
          const prefix = resolvedMultiplier === 3 ? "T" : resolvedMultiplier === 2 ? "D" : "S";
          const bed = resolvedMultiplier === 3 ? "Triple" : resolvedMultiplier === 2 ? "Double" : "Single";
          return {
            segment: {
              name: `${prefix}${numeric}`,
              number: numeric,
              multiplier: resolvedMultiplier,
              bed,
            },
          };
        }

        function assert(condition, label, details) {
          results.push({
            label,
            pass: Boolean(condition),
            details: details || "",
          });
        }

        function readCellPresentations(state, label) {
          const entry = state && state.states ? state.states.get(label) : null;
          return Array.isArray(entry?.cellStates)
            ? entry.cellStates.map((cellState) => cellState.presentation)
            : [];
        }

        function readBoardPresentation(state, label) {
          const entry = state && state.states ? state.states.get(label) : null;
          return String(entry?.boardPresentation || entry?.presentation || "");
        }

        function readBoardResolution(state) {
          return state?.snapshot?.activePlayerResolution || null;
        }

        assert(
          helper &&
            helper.__moduleId === "autodarts-cricket-state-shared" &&
            helper.__apiVersion === 2 &&
            helper.__buildSignature ===
              "autodarts-cricket-state-shared@2:2026-03-label-cell-shortfall-fix",
          "Shared helper exposes moduleId, apiVersion and buildSignature for runtime compatibility checks",
          helper
            ? JSON.stringify({
                moduleId: helper.__moduleId,
                apiVersion: helper.__apiVersion,
                buildSignature: helper.__buildSignature,
              })
            : "helper=null"
        );

        const twoPlayerOpenCricket = createUniformMarkSets(CRICKET_TARGETS, () => [3, 0]);
        const twoPlayerDangerCricket = createUniformMarkSets(CRICKET_TARGETS, () => [0, 3]);
        const threePlayerCricket = createUniformMarkSets(CRICKET_TARGETS, () => [0, 3, 0]);
        const soloCricket = createUniformMarkSets(CRICKET_TARGETS, () => [3]);
        const singleColumnCricket = CRICKET_TARGETS.map((label) =>
          label === "20" ? 3 : 0
        );
        const twoPlayerOpenTactics = createUniformMarkSets(TACTICS_TARGETS, () => [3, 0]);
        const twoPlayerDangerTactics = createUniformMarkSets(TACTICS_TARGETS, () => [0, 3]);
        const soloTactics = createUniformMarkSets(TACTICS_TARGETS, () => [3]);
        const tacticsScreenshotRegression = createUniformMarkSets(
          TACTICS_TARGETS,
          function (label) {
            if (label === "20" || label === "17" || label === "15") {
              return [3, 0];
            }
            if (label === "16") {
              return [0, 3];
            }
            if (label === "19") {
              return [3, 3];
            }
            return [0, 0];
          }
        );

        const case1 = buildState(
          buildLinearRoot(CRICKET_TARGETS, twoPlayerOpenCricket),
          2,
          0,
          "standard",
          "Cricket"
        );
        assert(
          case1.states.get("20").presentation === "offense",
          "Linear 2-player: active closed vs opponent open -> offense",
          JSON.stringify(case1.states.get("20"))
        );

        const case2 = buildState(
          buildLinearRoot(CRICKET_TARGETS, twoPlayerDangerCricket),
          2,
          0,
          "standard",
          "Cricket"
        );
        assert(
          case2.states.get("20").presentation === "pressure",
          "Linear 2-player: active open vs opponent closed -> pressure",
          JSON.stringify(case2.states.get("20"))
        );

        const case3 = buildState(
          buildLinearRoot(CRICKET_TARGETS, threePlayerCricket),
          3,
          1,
          "cut-throat",
          "Cricket"
        );
        assert(
          case3.states.get("20").presentation === "offense",
          "Linear 3-player: active player index stays relative to player cells",
          JSON.stringify(case3.states.get("20"))
        );

        const case4 = buildState(
          buildNestedRowRoot(CRICKET_TARGETS, twoPlayerDangerCricket),
          2,
          0,
          "standard",
          "Cricket"
        );
        assert(
          case4.states.get("20").presentation === "pressure",
          "Nested row container: wrapper children become player cells and preserve pressure",
          JSON.stringify(case4.states.get("20"))
        );

        const case5 = buildState(
          buildDecoratedLabelRoot(CRICKET_TARGETS, twoPlayerOpenCricket),
          2,
          0,
          "standard",
          "Cricket"
        );
        assert(
          case5.snapshot && case5.snapshot.rows.length === 7,
          "Decorated labels: helper still finds all 7 Cricket targets",
          case5.snapshot ? `rows=${case5.snapshot.rows.length}` : "snapshot=null"
        );
        assert(
          case5.snapshot &&
            case5.snapshot.rows.every(
              (row) => row.badgeNode && row.badgeNode !== row.labelCell
            ),
          "Decorated labels: dedicated badge nodes stay separate from label cells",
          case5.snapshot
            ? case5.snapshot.rows
                .map((row) => `${row.label}:${row.badgeNode === row.labelCell}`)
                .join(",")
            : "snapshot=null"
        );

        const case6 = buildState(
          buildLinearRoot(CRICKET_TARGETS, twoPlayerOpenCricket),
          2,
          0,
          "standard",
          "Cricket"
        );
        assert(
          case6.snapshot &&
            case6.snapshot.rows.every((row) => row.badgeNode === null),
          "Plain text label cells do not create synthetic badge nodes",
          case6.snapshot
            ? case6.snapshot.rows
                .map((row) => `${row.label}:${row.badgeNode === null}`)
                .join(",")
            : "snapshot=null"
        );

        const case6Combined = buildState(
          buildCombinedLabelPlayerRoot(CRICKET_TARGETS, twoPlayerOpenCricket),
          2,
          0,
          "standard",
          "Cricket"
        );
        assert(
          case6Combined.snapshot &&
            case6Combined.snapshot.rows.every(
              (row) => row.playerCells[0] === row.labelCell
            ),
          "Combined label/player cell: label cell is promoted to the first player slot",
          case6Combined.snapshot
            ? case6Combined.snapshot.rows
                .map((row) => `${row.label}:${row.playerCells[0] === row.labelCell}`)
                .join(",")
            : "snapshot=null"
        );
        assert(
          case6Combined.states.get("20").presentation === "offense" &&
            readCellPresentations(case6Combined, "20").join(",") ===
              "offense,pressure",
          "Combined label/player cell: offense stays on the label-bearing first column",
          JSON.stringify({
            state: case6Combined.states.get("20"),
            cells: readCellPresentations(case6Combined, "20"),
          })
        );

        const case6CombinedDanger = buildState(
          buildCombinedLabelPlayerRoot(CRICKET_TARGETS, twoPlayerDangerCricket),
          2,
          0,
          "standard",
          "Cricket"
        );
        assert(
          case6CombinedDanger.states.get("20").presentation === "pressure" &&
            readCellPresentations(case6CombinedDanger, "20").join(",") ===
              "pressure,offense",
          "Combined label/player cell: an open leading cell stays mapped even when its visible marks are zero",
          JSON.stringify({
            state: case6CombinedDanger.states.get("20"),
            cells: readCellPresentations(case6CombinedDanger, "20"),
          })
        );

        assert(
          helper.normalizeLabel("25") === "BULL" &&
            helper.normalizeLabel("BULLSEYE") === "BULL" &&
            helper.normalizeLabel("Bull") === "BULL",
          "Bull aliases normalize to BULL",
          [
            helper.normalizeLabel("25"),
            helper.normalizeLabel("BULLSEYE"),
            helper.normalizeLabel("Bull"),
          ].join(", ")
        );

        const case7 = buildState(
          buildLinearRoot(CRICKET_TARGETS, soloCricket),
          1,
          0,
          "standard",
          "Cricket"
        );
        assert(
          case7.states.get("20").presentation === "closed" &&
            !case7.states.get("20").dead,
          "Solo Cricket: closed stays closed and never dead",
          JSON.stringify(case7.states.get("20"))
        );

        const case8 = buildState(
          buildLinearRoot(CRICKET_TARGETS, twoPlayerOpenCricket),
          2,
          0,
          "mystery-mode",
          "Cricket"
        );
        assert(
          case8.states.get("20").presentation === "closed" &&
            !case8.states.get("20").offense &&
            !case8.states.get("20").danger,
          "Unknown mode: tactical highlights are suppressed",
          JSON.stringify(case8.states.get("20"))
        );

        const case9 = buildState(
          buildLinearRoot(TACTICS_TARGETS, twoPlayerOpenTactics),
          2,
          0,
          "standard",
          "Tactics"
        );
        assert(
          case9.snapshot &&
            case9.snapshot.rows.length === 12 &&
            case9.snapshot.targetOrder.join(",") === TACTICS_TARGETS.join(","),
          "Tactics: snapshot resolves the full 20..10,BULL target set",
          case9.snapshot ? case9.snapshot.targetOrder.join(",") : "snapshot=null"
        );
        assert(
          case9.states.get("14").presentation === "offense" &&
            case9.states.get("10").presentation === "offense",
          "Tactics standard: 14 and 10 participate like normal scoring targets",
          JSON.stringify({
            fourteen: case9.states.get("14"),
            ten: case9.states.get("10"),
          })
        );

        const case10 = buildState(
          buildLinearRoot(TACTICS_TARGETS, twoPlayerDangerTactics),
          2,
          0,
          "standard",
          "Tactics"
        );
        assert(
          case10.states.get("14").presentation === "pressure" &&
            case10.states.get("10").presentation === "pressure",
          "Tactics standard: 14 and 10 can also become pressure targets",
          JSON.stringify({
            fourteen: case10.states.get("14"),
            ten: case10.states.get("10"),
          })
        );

        const case11 = buildState(
          buildLinearRoot(TACTICS_TARGETS, twoPlayerOpenTactics),
          2,
          0,
          "no-score",
          "Tactics"
        );
        assert(
          case11.states.get("12").presentation === "closed" &&
            !case11.states.get("12").offense &&
            !case11.states.get("12").danger,
          "Tactics no-score: tactical highlights stay neutral",
          JSON.stringify(case11.states.get("12"))
        );

        const case12 = buildState(
          buildLinearRoot(TACTICS_TARGETS, soloTactics),
          1,
          0,
          "standard",
          "Tactics"
        );
        assert(
          case12.states.get("11").presentation === "closed" &&
            !case12.states.get("11").dead,
          "Solo Tactics: closed stays closed and never dead",
          JSON.stringify(case12.states.get("11"))
        );

        const case13 = buildState(
          buildDecoratedLabelRoot(TACTICS_TARGETS, twoPlayerOpenTactics),
          2,
          0,
          "cut-throat",
          "Tactics"
        );
        assert(
          case13.snapshot && case13.snapshot.rows.length === 12,
          "Decorated labels: helper still finds all 12 Tactics targets",
          case13.snapshot ? `rows=${case13.snapshot.rows.length}` : "snapshot=null"
        );

        const case14 = buildState(
          buildLinearRoot(TACTICS_TARGETS, twoPlayerOpenTactics),
          2,
          0,
          "standard",
          "",
          {
            includeGameMode: false,
            includeFamilyVariant: false,
          }
        );
        assert(
          case14.snapshot &&
            case14.snapshot.gameModeInfo &&
            case14.snapshot.gameModeInfo.normalized === "tactics",
          "Row inference: 10..14 force Tactics even without explicit game mode",
          case14.snapshot
            ? JSON.stringify(case14.snapshot.gameModeInfo)
            : "snapshot=null"
        );

        const case15 = buildState(
          buildLinearRoot(TACTICS_TARGETS, twoPlayerOpenTactics),
          2,
          0,
          "standard",
          "Cricket"
        );
        assert(
          case15.snapshot &&
            case15.snapshot.rows.length === 7 &&
            !case15.states.has("14"),
          "Cricket mode filter: 10..14 are excluded when the game mode is Cricket",
