<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cricket / Tactics Target Highlighter Harness</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        background: #111;
        color: #f5f5f5;
      }

      .pass {
        color: #86efac;
      }

      .fail {
        color: #fca5a5;
      }

      code {
        color: #93c5fd;
      }

      #fixture {
        display: grid;
        grid-template-columns: 1fr 540px;
        gap: 24px;
        align-items: start;
      }

      #ad-ext-player-display {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
      }

      .ad-ext-player {
        min-width: 120px;
        padding: 12px;
        border: 2px solid #333;
      }

      .ad-ext-player-active {
        border-color: #9fdb58;
      }

      #grid {
        display: grid;
        grid-template-columns: 72px repeat(2, 96px);
        gap: 4px;
      }

      #grid > div {
        min-height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1b1b1b;
        color: #f5f5f5;
      }

      .label-cell {
        justify-content: flex-start;
        padding-left: 10px;
      }

      .player-cell {
        position: relative;
      }

      #board {
        width: 520px;
        height: 520px;
        background: #000;
      }
    </style>
    <script>
      (function () {
        "use strict";

        const sharedState = {
          activePlayerIndex: 0,
          scoringMode: "standard",
          gameMode: "Cricket",
          activeThrows: [],
          matchState: {
            players: [{ id: "player-1" }, { id: "player-2" }],
            turns: [],
          },
        };
        const subscribers = new Set();

        window.__targetHarnessState = sharedState;
        window.autodartsGameStateShared = {
          __initialized: true,
          getActivePlayerIndex: function () {
            return sharedState.activePlayerIndex;
          },
          getCricketMode: function () {
            return sharedState.scoringMode;
          },
          getCricketGameMode: function () {
            return sharedState.gameMode;
          },
          isCricketVariant: function () {
            return true;
          },
          getActiveTurn: function () {
            return null;
          },
          getActiveThrows: function () {
            return Array.isArray(sharedState.activeThrows)
              ? sharedState.activeThrows
              : [];
          },
          getState: function () {
            return {
              match: sharedState.matchState,
              updatedAt: 1,
              source: "test",
            };
          },
          subscribe: function (listener) {
            if (typeof listener !== "function") {
              return function () {};
            }
            subscribers.add(listener);
            return function () {
              subscribers.delete(listener);
            };
          },
        };
        sharedState.emit = function () {
          subscribers.forEach(function (listener) {
            listener();
          });
        };
      })();
    </script>
    <script src="../Template/autodarts-theme-shared.js"></script>
    <script src="../Animation/autodarts-animation-shared.js"></script>
    <script src="../Animation/autodarts-cricket-state-shared.js"></script>
    <script src="../Template/Autodarts%20Theme%20Cricket.user.js"></script>
    <script src="../Animation/Autodarts%20Animate%20Cricket%20Grid%20FX.user.js"></script>
    <script src="../Animation/Autodarts%20Animate%20Cricket%20Target%20Highlighter.user.js"></script>
  </head>
  <body>
    <h1>Cricket / Tactics Target Highlighter Harness</h1>
    <p id="summary">Running…</p>
    <ul id="results"></ul>

    <div id="fixture">
      <div>
        <div id="ad-ext-game-variant">Tactics</div>
        <div id="ad-ext-player-display"></div>
        <div id="grid"></div>
      </div>
      <svg id="board" viewBox="-250 -250 500 500" aria-label="Board">
        <g id="board-base">
          <circle r="210" fill="#202124"></circle>
          <circle r="150" fill="#2b2b2b"></circle>
          <circle r="15" fill="#9fdb58"></circle>
          <text x="0" y="-220">20</text>
          <text x="68" y="-206">1</text>
          <text x="130" y="-174">18</text>
          <text x="178" y="-118">4</text>
          <text x="205" y="-48">13</text>
          <text x="205" y="30">6</text>
          <text x="178" y="102">10</text>
          <text x="130" y="164">15</text>
          <text x="68" y="202">2</text>
          <text x="0" y="218">17</text>
          <text x="-68" y="202">3</text>
          <text x="-130" y="164">19</text>
          <text x="-178" y="102">7</text>
          <text x="-205" y="30">16</text>
          <text x="-205" y="-48">8</text>
          <text x="-178" y="-118">11</text>
          <text x="-130" y="-174">14</text>
          <text x="-68" y="-206">9</text>
          <text x="-6" y="-230">5</text>
          <text x="6" y="236">12</text>
        </g>
      </svg>
    </div>

    <script>
      (function () {
        "use strict";

        const TACTICS_TARGETS = [
          "20",
          "19",
          "18",
          "17",
          "16",
          "15",
          "14",
          "13",
          "12",
          "11",
          "10",
          "BULL",
        ];
        const CRICKET_TARGETS = ["20", "19", "18", "17", "16", "15", "BULL"];
        const overlayId = "ad-ext-cricket-targets";
        const results = [];
        const sharedState = window.__targetHarnessState;

        function assert(condition, label, details) {
          results.push({
            label,
            pass: Boolean(condition),
            details: details || "",
          });
        }

        function buildMarkMap(targetOrder, overrides) {
          const marksByLabel = {};
          targetOrder.forEach((label) => {
            marksByLabel[label] = [0, 0];
          });
          Object.keys(overrides || {}).forEach((label) => {
            marksByLabel[label] = overrides[label].slice();
          });
          return marksByLabel;
        }

        function buildUniformMarkMap(targetOrder, markPair) {
          const marks = Array.isArray(markPair) ? markPair.slice(0, 2) : [0, 0];
          return targetOrder.reduce((result, label) => {
            result[label] = marks.slice();
            return result;
          }, {});
        }

        function createThrowForLabel(label, multiplier) {
          const normalizedLabel = String(label || "").toUpperCase();
          const resolvedMultiplier = Number.isFinite(multiplier)
            ? Math.max(1, Math.min(3, Math.round(multiplier)))
            : 1;
          if (normalizedLabel === "BULL") {
            const isDoubleBull = resolvedMultiplier >= 2;
            return {
              segment: {
                name: isDoubleBull ? "DBULL" : "S25",
                number: 25,
                multiplier: isDoubleBull ? 2 : 1,
                bed: isDoubleBull ? "Inner Bull" : "Outer Bull",
              },
            };
          }
          const numeric = Number(label);
          const prefix = resolvedMultiplier === 3 ? "T" : resolvedMultiplier === 2 ? "D" : "S";
          const bed = resolvedMultiplier === 3 ? "Triple" : resolvedMultiplier === 2 ? "Double" : "Single";
          return {
            segment: {
              name: `${prefix}${numeric}`,
              number: numeric,
              multiplier: resolvedMultiplier,
              bed,
            },
          };
        }

        function renderPlayers(
          activePlayerIndex,
          players,
          domOrder,
          visualOrder,
          includeIds,
          activePlayerIndices
        ) {
          const host = document.getElementById("ad-ext-player-display");
          host.textContent = "";
          const activeIndices = new Set(
            Array.isArray(activePlayerIndices)
              ? activePlayerIndices.filter((value) => Number.isFinite(value))
              : Number.isFinite(activePlayerIndex)
                ? [activePlayerIndex]
                : []
          );
          const playerList = Array.isArray(players) && players.length
            ? players
            : [
                { id: "player-1", name: "P1" },
                { id: "player-2", name: "P2" },
              ];
          const resolvedDomOrder =
            Array.isArray(domOrder) && domOrder.length === playerList.length
              ? domOrder
              : playerList.map((_, index) => index);
          const resolvedVisualOrder =
            Array.isArray(visualOrder) && visualOrder.length === playerList.length
              ? visualOrder
              : playerList.map((_, index) => index);

          resolvedDomOrder.forEach((playerIndex) => {
            const playerInfo = playerList[playerIndex] || {};
            const wrapper = document.createElement("div");
            wrapper.className = `player-wrap player-wrap-${playerIndex}`;
            wrapper.style.display = "flex";
            wrapper.style.order = String(
              Number.isFinite(resolvedVisualOrder[playerIndex])
                ? resolvedVisualOrder[playerIndex]
                : playerIndex
            );
            const player = document.createElement("div");
            player.className = "ad-ext-player";
            if (includeIds !== false && playerInfo.id) {
              player.setAttribute("data-player-id", String(playerInfo.id));
            }
            if (activeIndices.has(playerIndex)) {
              player.classList.add("ad-ext-player-active");
            }
            const nameNode = document.createElement("span");
            nameNode.className = "ad-ext-player-name";
            nameNode.textContent = playerInfo.name || `P${playerIndex + 1}`;
            player.appendChild(nameNode);
            wrapper.appendChild(player);
            host.appendChild(wrapper);
          });
        }

        function renderGridInto(grid, targetOrder, marksByLabel, options) {
          const config = options || {};
          const labelCellPlayerIndex = Number.isFinite(config.labelCellPlayerIndex)
            ? config.labelCellPlayerIndex
            : null;
          grid.textContent = "";
          targetOrder.forEach((label) => {
            const markValues = marksByLabel[label] || [0, 0];
            const labelCell = document.createElement("div");
            labelCell.className = "label-cell";
            labelCell.dataset.rowLabel = label;
            const badge = document.createElement("span");
            badge.textContent = label;
            labelCell.appendChild(badge);

            if (
              labelCellPlayerIndex !== null &&
              labelCellPlayerIndex >= 0 &&
              labelCellPlayerIndex < markValues.length
            ) {
              const labelMark = markValues[labelCellPlayerIndex] || 0;
              labelCell.dataset.playerIndex = String(labelCellPlayerIndex);
              labelCell.setAttribute("data-marks", String(labelMark));
              const markSlot = document.createElement("span");
              markSlot.className = "label-mark-slot";
              if (labelMark > 0) {
                const icon = document.createElement("img");
                icon.setAttribute("alt", String(labelMark));
                markSlot.appendChild(icon);
              }
              labelCell.appendChild(markSlot);
            }

            grid.appendChild(labelCell);

            markValues.forEach((mark, playerIndex) => {
              if (playerIndex === labelCellPlayerIndex) {
                return;
              }
              const cell = document.createElement("div");
              cell.className = "player-cell";
              cell.dataset.rowLabel = label;
              cell.dataset.playerIndex = String(playerIndex);
              cell.setAttribute("data-marks", String(mark));
              cell.textContent = String(mark);
              grid.appendChild(cell);
            });
          });
        }

        function clearExtraGrids() {
          document
            .querySelectorAll("[data-test-extra-grid='true']")
            .forEach((node) => node.remove());
        }

        function renderGrid(targetOrder, marksByLabel, options) {
          const config = options || {};
          const grid = document.getElementById("grid");
          clearExtraGrids();
          renderGridInto(grid, targetOrder, marksByLabel, config);

          (config.hiddenGrids || []).forEach((gridConfig, index) => {
            const hiddenGrid = document.createElement("div");
            hiddenGrid.dataset.testExtraGrid = "true";
            hiddenGrid.className = "grid-root-hidden";
            hiddenGrid.style.display = "none";
            hiddenGrid.style.gridTemplateColumns =
              getComputedStyle(grid).gridTemplateColumns;
            const hiddenConfig = {
              ...config,
              ...(gridConfig || {}),
            };
            renderGridInto(
              hiddenGrid,
              gridConfig.targetOrder || targetOrder,
              gridConfig.marksByLabel || {},
              hiddenConfig
            );
            grid.parentNode.insertBefore(hiddenGrid, grid);
          });
        }

        function readMetrics() {
          const overlay = document.getElementById(overlayId);
          const visibleGrid = document.getElementById("grid");
          function countOverlayShapesByLabel(className) {
            const counts = {};
            if (!overlay) {
              return counts;
            }
            overlay
              .querySelectorAll(`.${className}[data-target-label]`)
              .forEach((shape) => {
                const key = String(shape.getAttribute("data-target-label") || "");
                if (!key) {
                  return;
                }
                counts[key] = (counts[key] || 0) + 1;
              });
            return counts;
          }
          function readOverlayPresentationsByLabel() {
            const presentations = {};
            if (!overlay) {
              return presentations;
            }
            overlay.querySelectorAll("[data-target-label]").forEach((shape) => {
              const label = String(shape.getAttribute("data-target-label") || "");
              const presentation = String(
                shape.getAttribute("data-target-presentation") || ""
              );
              if (!label || !presentation || label in presentations) {
                return;
              }
              presentations[label] = presentation;
            });
            return presentations;
          }
          function countCellsByPlayer(className) {
            const counts = {};
            if (!visibleGrid) {
              return counts;
            }
            visibleGrid.querySelectorAll(`.${className}[data-player-index]`).forEach((cell) => {
              const key = String(cell.getAttribute("data-player-index") || "");
              counts[key] = (counts[key] || 0) + 1;
            });
            return counts;
          }
          return {
            overlay: Boolean(overlay),
            scoreShapes: overlay
              ? overlay.querySelectorAll(".ad-ext-cricket-target--score").length
              : 0,
            dangerShapes: overlay
              ? overlay.querySelectorAll(".ad-ext-cricket-target--danger").length
              : 0,
            deadShapes: overlay
              ? overlay.querySelectorAll(".ad-ext-cricket-target--dead").length
              : 0,
            scoreShapesByLabel: countOverlayShapesByLabel(
              "ad-ext-cricket-target--score"
            ),
            dangerShapesByLabel: countOverlayShapesByLabel(
              "ad-ext-cricket-target--danger"
            ),
            deadShapesByLabel: countOverlayShapesByLabel(
              "ad-ext-cricket-target--dead"
            ),
            overlayPresentationsByLabel: readOverlayPresentationsByLabel(),
            overlayScoreFill: overlay
              ? String(
                  overlay.style.getPropertyValue("--ad-ext-cricket-score-fill") || ""
                ).trim()
              : "",
            overlayDangerFill: overlay
              ? String(
                  overlay.style.getPropertyValue("--ad-ext-cricket-danger-fill") || ""
                ).trim()
              : "",
            overlayDeadFill: overlay
              ? String(
                  overlay.style.getPropertyValue("--ad-ext-cricket-dead-fill") || ""
                ).trim()
              : "",
            gridFxStyleText: String(
              document.getElementById("ad-ext-crfx-style")?.textContent || ""
            ),
            gridScoreCells: visibleGrid
              ? visibleGrid.querySelectorAll(".ad-ext-crfx-score").length
              : 0,
            gridThreatCells: visibleGrid
              ? visibleGrid.querySelectorAll(".ad-ext-crfx-threat").length
              : 0,
            gridDeadCells: visibleGrid
              ? visibleGrid.querySelectorAll(".ad-ext-crfx-dead").length
              : 0,
            gridLabelScoreCells: visibleGrid
              ? visibleGrid.querySelectorAll(".label-cell.ad-ext-crfx-score").length
              : 0,
            gridLabelThreatCells: visibleGrid
              ? visibleGrid.querySelectorAll(".label-cell.ad-ext-crfx-threat").length
              : 0,
            gridScoreCellsByPlayer: countCellsByPlayer("ad-ext-crfx-score"),
            gridThreatCellsByPlayer: countCellsByPlayer("ad-ext-crfx-threat"),
            gridDeadCellsByPlayer: countCellsByPlayer("ad-ext-crfx-dead"),
            themeApplied: Boolean(
              document.getElementById("autodarts-cricket-custom-style")
            ),
            gridFxActive: document.getElementById("grid")?.classList.contains(
              "ad-ext-crfx-root"
            ),
            wrapperBadges: visibleGrid
              ? visibleGrid.querySelectorAll(".label-cell.ad-ext-crfx-badge").length
              : 0,
          };
        }

        function waitForMetrics(predicate, attemptsLeft) {
          return new Promise((resolve) => {
            const metrics = readMetrics();
            if (!predicate || predicate(metrics) || attemptsLeft <= 0) {
              resolve(metrics);
              return;
            }

            setTimeout(async function () {
              resolve(await waitForMetrics(predicate, attemptsLeft - 1));
            }, 120);
          });
        }

        async function runScenario(config) {
          document.getElementById("ad-ext-game-variant").textContent = config.variant;
          sharedState.activePlayerIndex = config.stateActivePlayerIndex;
          sharedState.scoringMode = config.scoringMode;
          sharedState.gameMode = config.variant;
          sharedState.activeThrows = Array.isArray(config.activeThrows)
            ? config.activeThrows.slice()
            : [];
          sharedState.matchState = config.matchState || {
            players: [{ id: "player-1" }, { id: "player-2" }],
            turns: [],
          };

          renderPlayers(
            config.domActivePlayerIndex,
            config.players,
            config.playerDomOrder,
            config.playerVisualOrder,
            config.includeIds,
            config.domActivePlayerIndices
          );
          renderGrid(config.targetOrder, config.marksByLabel, {
            hiddenGrids: config.hiddenGrids,
            labelCellPlayerIndex: config.labelCellPlayerIndex,
          });
          if (typeof sharedState.emit === "function") {
            sharedState.emit();
          }

          return waitForMetrics(config.readyWhen, 72);
        }

        (async function run() {
          const runtimeShared = window.autodartsAnimationShared || {};
          const disposeEvents = [];
          const runtimeClaimA = runtimeShared.claimFeatureInstance({
            featureKey: "test/runtime-cricket-target",
            version: "2.8",
            sourcePath: "tests/runtime-a.user.js",
            executionSource: "standalone-userscript",
            onDispose: function (payload) {
              disposeEvents.push(payload || null);
            },
          });
          const runtimeClaimB = runtimeShared.claimFeatureInstance({
            featureKey: "test/runtime-cricket-target",
            version: "2.8",
            sourcePath: "tests/runtime-b.user.js",
            executionSource: "xconfig-loader",
          });
          const runtimeClaimC = runtimeShared.claimFeatureInstance({
            featureKey: "test/runtime-cricket-target",
            version: "2.9",
            sourcePath: "tests/runtime-c.user.js",
            executionSource: "xconfig-loader",
          });
          const runtimeOverlay = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "g"
          );
          runtimeOverlay.id = "test-runtime-overlay";
          runtimeShared.markOverlayOwner(
            runtimeOverlay,
            runtimeClaimC.ownerMeta
          );
          const runtimeOverlayOwner = runtimeShared.readOverlayOwner(
            runtimeOverlay
          );
          assert(
            runtimeClaimA.active &&
              !runtimeClaimB.active &&
              runtimeClaimB.reason === "same-version-already-active" &&
              runtimeClaimC.active &&
              runtimeClaimC.reason === "replaced-older-owner" &&
              disposeEvents.length === 1,
            "Runtime-Singleton: gleiche Version wird verworfen, neuere Version übernimmt und disposed den alten Owner",
            JSON.stringify({
              runtimeClaimA,
              runtimeClaimB,
              runtimeClaimC,
              disposeEvents,
            })
          );
          assert(
            runtimeOverlayOwner &&
              runtimeOverlayOwner.featureKey ===
                "test/runtime-cricket-target" &&
              runtimeOverlayOwner.token === runtimeClaimC.token,
            "Overlay-Ownership: mark/read bleibt auf dem aktuellen Runtime-Owner stabil",
            JSON.stringify(runtimeOverlayOwner)
          );
          runtimeShared.releaseFeatureInstance(
            "test/runtime-cricket-target",
            runtimeClaimC.token
          );

          const case1 = await runScenario({
            variant: "Tactics",
            scoringMode: "standard",
            stateActivePlayerIndex: 1,
            domActivePlayerIndex: 0,
            targetOrder: TACTICS_TARGETS,
            marksByLabel: buildMarkMap(TACTICS_TARGETS, {
              "10": [3, 0],
            }),
            readyWhen: function (metrics) {
              return (
                metrics.scoreShapes === 4 &&
                metrics.gridScoreCells === 1 &&
                metrics.gridThreatCells === 1
              );
            },
          });
          assert(
            case1.overlay &&
              case1.scoreShapes === 4 &&
              case1.dangerShapes === 0 &&
              case1.gridScoreCells === 1 &&
              case1.gridScoreCellsByPlayer["0"] === 1 &&
              case1.gridThreatCells === 1 &&
              case1.gridThreatCellsByPlayer["1"] === 1 &&
              case1.themeApplied &&
              case1.gridFxActive,
            "Tactics mismatch: DOM-active player keeps target 10 am Board offensiv, während das Grid gleichzeitig Gegnerdruck zeigt",
            JSON.stringify(case1)
          );

          const case2 = await runScenario({
            variant: "Tactics",
            scoringMode: "standard",
            stateActivePlayerIndex: 0,
            domActivePlayerIndex: 0,
            targetOrder: TACTICS_TARGETS,
            marksByLabel: buildMarkMap(TACTICS_TARGETS, {}),
            activeThrows: [
              {
                segment: {
                  name: "T20",
                  number: 20,
                  multiplier: 3,
                  bed: "Triple",
                },
              },
            ],
            readyWhen: function (metrics) {
              return (
                metrics.scoreShapes === 4 &&
                metrics.gridScoreCells === 1 &&
                metrics.gridThreatCells === 1
              );
            },
          });
          assert(
            case2.overlay &&
              case2.scoreShapes === 4 &&
              case2.dangerShapes === 0 &&
              case2.gridScoreCells === 1 &&
              case2.gridScoreCellsByPlayer["0"] === 1 &&
              case2.gridThreatCells === 1 &&
              case2.gridThreatCellsByPlayer["1"] === 1 &&
              case2.themeApplied &&
              case2.gridFxActive,
            "Ein laufender T20-Wurf färbt 20 sofort grün am Board und zeigt im Grid gleichzeitig offense plus pressure",
            JSON.stringify(case2)
          );

          const case3 = await runScenario({
            variant: "Tactics",
            scoringMode: "standard",
            stateActivePlayerIndex: 1,
            domActivePlayerIndex: 1,
            targetOrder: TACTICS_TARGETS,
            marksByLabel: buildMarkMap(TACTICS_TARGETS, {}),
            matchState: {
              players: [{ id: "player-1" }, { id: "player-2" }],
              turns: [
                {
                  playerId: "player-1",
                  finishedAt: "2026-03-04T15:00:00.000Z",
                  throws: [
                    {
                      segment: {
                        name: "T20",
                        number: 20,
                        multiplier: 3,
                        bed: "Triple",
                      },
                    },
                  ],
                },
              ],
            },
            readyWhen: function (metrics) {
              return (
                metrics.dangerShapes === 4 &&
                metrics.gridScoreCells === 1 &&
                metrics.gridThreatCells === 1
              );
            },
          });
          assert(
            case3.overlay &&
              case3.scoreShapes === 0 &&
              case3.dangerShapes === 4 &&
              case3.gridScoreCells === 1 &&
              case3.gridScoreCellsByPlayer["0"] === 1 &&
              case3.gridThreatCells === 1 &&
              case3.gridThreatCellsByPlayer["1"] === 1 &&
              case3.themeApplied &&
              case3.gridFxActive,
            "Nach dem Spielerwechsel färbt ein gegnerischer T20 die 20 sofort rot am Board, während die geschlossene Gegnerspalte offensiv bleibt",
            JSON.stringify(case3)
          );

          const case4 = await runScenario({
            variant: "Tactics",
            scoringMode: "standard",
            stateActivePlayerIndex: 1,
            domActivePlayerIndex: 1,
            targetOrder: TACTICS_TARGETS,
            marksByLabel: buildMarkMap(TACTICS_TARGETS, {
              "20": [3, 0],
              "18": [1, 0],
              "10": [3, 0],
            }),
            hiddenGrids: [
              {
                targetOrder: TACTICS_TARGETS,
                marksByLabel: buildMarkMap(TACTICS_TARGETS, {}),
              },
            ],
            readyWhen: function (metrics) {
              return (
                metrics.dangerShapes === 8 &&
                metrics.gridScoreCells === 2 &&
                metrics.gridThreatCells === 2
              );
            },
          });
          assert(
            case4.overlay &&
              case4.scoreShapes === 0 &&
              case4.dangerShapes === 8 &&
              case4.gridScoreCells === 2 &&
              case4.gridScoreCellsByPlayer["0"] === 2 &&
              case4.gridThreatCells === 2 &&
              case4.gridThreatCellsByPlayer["1"] === 2 &&
              case4.themeApplied &&
              case4.gridFxActive &&
              case4.wrapperBadges === 0,
            "Ein sichtbares Grid bleibt auch neben einem versteckten Alt-Grid die aktive Datenquelle und hält offense/pressure pro Spieler getrennt",
            JSON.stringify(case4)
          );

          const case5 = await runScenario({
            variant: "Tactics",
            scoringMode: "standard",
            stateActivePlayerIndex: 1,
            domActivePlayerIndex: 1,
            players: [
              { id: "player-1", name: "TEST1" },
              { id: "player-2", name: "TEST2" },
            ],
            targetOrder: TACTICS_TARGETS,
